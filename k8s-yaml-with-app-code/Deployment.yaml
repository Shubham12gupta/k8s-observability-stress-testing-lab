apiVersion: apps/v1
kind: Deployment

metadata:
  name: dummy-app-deployment
  namespace: dummy
  labels:
    app: dummy-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dummy-app

  template:
    metadata:
      labels:
        app: dummy-app

    spec:
      containers:
      - name: dummy-k8s-container
        image: shubham12gupta/dummy-k8s-app
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
