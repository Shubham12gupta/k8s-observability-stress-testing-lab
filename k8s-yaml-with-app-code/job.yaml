apiVersion: batch/v1
kind: Job
metadata:
  name: dummy-app-job
  namespace: dummy

spec:
  completions: 1
  backoffLimit: 3

  template:
    metadata:
      labels:
        app: dummy-job

    spec:
      containers:
      - name: dummy-job-container
        image: shubham12gupta/dummy-k8s-app

      restartPolicy: Never
