apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dummy-app-statefulset
  namespace: dummy
spec:
  serviceName: dummy-app-service
  replicas: 3

  selector:
    matchLabels:
      app: dummy-app

  template:
    metadata:
      labels:
        app: dummy-app

    spec:
      containers:
      - name: dummy-k8s-container
        image: shubham12gupta/dummy-k8s-app
        ports:
        - containerPort: 5000

        volumeMounts:
        - name: dummy-storage
          mountPath: /data

  volumeClaimTemplates:
  - metadata:
      name: dummy-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
